name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Required if ui/ folder requires dependencies and building prior to package packaging
      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies and build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
